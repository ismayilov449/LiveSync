services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - livesync-sql:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5252:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Hosting__ApplyMigrationsOnStartup: "true"
      ConnectionStrings__ControlPlane: "Server=sqlserver,1433;Database=LiveSync_ControlPlane;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Tenancy__ConnectionTemplate: "Server=sqlserver,1433;Database={DatabaseName};User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      Auth__Jwt__SecretKey: "local-dev-signing-key-change-me-min-32-chars"
      Cors__AllowedOrigins__0: "http://localhost:5252"
      Cors__AllowedOrigins__1: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Hosting__ApplyMigrationsOnStartup: "true"
      ConnectionStrings__ControlPlane: "Server=sqlserver,1433;Database=LiveSync_ControlPlane;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Tenancy__ConnectionTemplate: "Server=sqlserver,1433;Database={DatabaseName};User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      Auth__Jwt__SecretKey: "local-dev-signing-key-change-me-min-32-chars"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  livesync-sql:
